<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tex's Portfolio</title>

    <!-- Link Preview -->
    <meta property="og:title" content="Tex's Portfolio">
    <meta property="og:description" content="Logos • Banners • GFX by Texversal">
    <meta property="og:image" content="https://texversa-dev.github.io/assets/images/banners/b1.png">
    <meta property="og:url" content="https://texversa-dev.github.io">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <div class="container">

        <header>
            <h1>Tex's Portfolio</h1>
            <p>Logos • Banners • GFX</p>
            <p>Sigma?</p>

            <div class="links">
                <a href="https://discord.com/users/758739147443273789" target="_blank">Discord</a>
                <a href="https://www.roblox.com/users/1515085030/profile" target="_blank">Roblox</a>
            </div>

            <!-- ⭐ Hits.sh Visitor Counter -->
            <div id="view-counter">
<a href="https://hits.sh/texsportfolio.netlify.app/">
  <img alt="Hits" src="https://hits.sh/texsportfolio.netlify.app.svg?label=Views&color=000000&extraCount=50"/>
</a>

            </div>
        </header>

        <nav class="tabs">
            <button onclick="showTab('logos')">Logos</button>
            <button onclick="showTab('banners')">Banners</button>
            <button onclick="showTab('gfx')">GFX</button>
            <button onclick="showTab('ranks')">Past Ranks</button>
        </nav>

        <section id="logos" class="tab active">
            <h2>Logos</h2>
            <div class="gallery" id="logos-gallery"></div>
        </section>

        <section id="banners" class="tab">
            <h2>Banners</h2>
            <div class="gallery" id="banners-gallery"></div>
        </section>

        <section id="gfx" class="tab">
            <h2>GFX</h2>
            <div class="gallery" id="gfx-gallery"></div>
        </section>

        <!-- ⭐ Past Ranks Tab -->
        <section id="ranks" class="tab">
            <h2>Past Ranks</h2>

            <div class="ranks-content">
                <p><strong>Server:</strong> <a href="https://discord.gg/72J6mrGFKG" target="_blank">Design Warehouse</a></p>
                <p><strong>Rank:</strong> Designer</p>
                <p><strong>Notes:</strong> Designed banners, logos, and GFX.</p>

                <hr>

                <p><strong>Server:</strong> <a href="https://discord.gg/72J6mrGFKG" target="_blank">@growingerlc</a></p>
                <p><strong>Rank:</strong> Executive</p>
                <p><strong>Notes:</strong> Owned</p>
            </div>
        </section>

    </div>

<script>

// Load images with cache-busting
fetch("assets/images/images.json?v=" + Date.now())
    .then(res => res.json())
    .then(data => {
        loadImages("logos", data.logos);
        loadImages("banners", data.banners);
        loadImages("gfx", data.gfx);
    });

function loadImages(type, files) {
    const gallery = document.getElementById(type + "-gallery");
    files.forEach(file => {
        const img = document.createElement("img");
        img.src = `assets/images/${type}/${file}?v=${Date.now()}`;
        gallery.appendChild(img);
    });
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

</script>

</body>
</html>
