<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tex's Portfolio</title>

    <meta property="og:title" content="Tex's Portfolio">
    <meta property="og:description" content="Logos • Banners • GFX by Texversal">
    <meta property="og:image" content="https://cdn.discordapp.com/attachments/1473536417014612113/1496300963265249381/image.png?ex=69e9625d&is=69e810dd&hm=b897e18549007b18f43a461994f94e8798fed9dd5bf254583b3ec870ace6d99d&">
    <meta property="og:url" content="https://texversa-dev.github.io">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <div class="container">

        <header>
            <h1>Tex's Portfolio</h1>
            <p>Logos • Banners • GFX </p>
            <p>Sigma? </p>

            <div class="links">
                <a href="https://discord.com/users/758739147443273789" target="_blank">Discord</a>
                <a href="https://www.roblox.com/users/1515085030/profile" target="_blank">Roblox</a>
            </div>
        </header>

        <nav class="tabs">
            <button onclick="showTab('logos')">Logos</button>
            <button onclick="showTab('banners')">Banners</button>
            <button onclick="showTab('gfx')">GFX</button>
        </nav>

        <section id="logos" class="tab active">
            <h2>Logos</h2>
            <div class="gallery" id="logos-gallery"></div>
        </section>

        <section id="banners" class="tab">
            <h2>Banners</h2>
            <div class="gallery" id="banners-gallery"></div>
        </section>

        <section id="gfx" class="tab">
            <h2>GFX</h2>
            <div class="gallery" id="gfx-gallery"></div>
        </section>

    </div>

<script>

fetch("assets/images/images.json?v=" + Date.now())
    .then(res => res.json())
    .then(data => {
        loadImages("logos", data.logos);
        loadImages("banners", data.banners);
        loadImages("gfx", data.gfx);
    });

function loadImages(type, files) {
    const gallery = document.getElementById(type + "-gallery");
    files.forEach(file => {
        const img = document.createElement("img");
        img.src = `assets/images/${type}/${file}?v=${Date.now()}`;
        gallery.appendChild(img);
    });
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}
</script>

</body>
</html>
